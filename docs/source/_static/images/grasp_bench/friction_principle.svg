<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="sans-serif">
  <!-- Left finger -->
  <rect x="100" y="80" width="30" height="160" rx="4" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="115" y="70" text-anchor="middle" font-size="13" fill="#374151">左指</text>

  <!-- Right finger -->
  <rect x="290" y="80" width="30" height="160" rx="4" fill="#d1d5db" stroke="#6b7280" stroke-width="1.5"/>
  <text x="305" y="70" text-anchor="middle" font-size="13" fill="#374151">右指</text>

  <!-- Object (cube) -->
  <rect x="130" y="100" width="160" height="120" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="167" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">物体 m</text>

  <!-- Normal force N (left, pointing right) -->
  <line x1="68" y1="160" x2="128" y2="160" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="60" y="156" text-anchor="end" font-size="14" font-weight="bold" font-style="italic" fill="#2563eb">N</text>

  <!-- Normal force N (right, pointing left) -->
  <line x1="352" y1="160" x2="292" y2="160" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="360" y="156" text-anchor="start" font-size="14" font-weight="bold" font-style="italic" fill="#2563eb">N</text>

  <!-- Friction force (left, pointing up) -->
  <line x1="130" y1="200" x2="130" y2="130" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="122" y="128" text-anchor="end" font-size="14" font-weight="bold" font-style="italic" fill="#059669">μN</text>

  <!-- Friction force (right, pointing up) -->
  <line x1="290" y1="200" x2="290" y2="130" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="298" y="128" text-anchor="start" font-size="14" font-weight="bold" font-style="italic" fill="#059669">μN</text>

  <!-- Gravity (pointing down) -->
  <line x1="210" y1="220" x2="210" y2="290" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="210" y="308" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic" fill="#dc2626">mg</text>

  <!-- Condition text -->
  <text x="210" y="26" text-anchor="middle" font-size="14" fill="#374151">平衡条件：2μN ≥ mg</text>
  <text x="210" y="48" text-anchor="middle" font-size="14" fill="#374151">临界摩擦系数：μ_crit = mg / 2N</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
